<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <title>Professional Study Room - DocNest</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="study-room-page">
        <!-- Page Header -->
        <div class="page-header" id="page-header">
            <!-- Content loaded by app.js -->
        </div>

        <!-- Hero Image -->
        <div id="hero-section">
            <!-- Content loaded by app.js -->
        </div>

        <!-- Features Grid -->
        <div class="feature-grid" id="features-grid">
            <!-- Content loaded by app.js -->
        </div>

        <!-- Section Heading -->
        <h2 class="section-heading">Study Room Plans</h2>

        <!-- Pricing Grid -->
        <div class="pricing-grid" id="pricing-grid">
            <!-- Content loaded by app.js -->
        </div>

        <!-- Facility Details -->
        <h2 class="section-heading">Facility Details</h2>

        <div class="info-grid" id="facility-grid">
            <!-- Content loaded by app.js -->
        </div>

        <!-- Schedule & Guidelines -->
        <h2 class="section-heading">Operating Hours & Guidelines</h2>

        <div class="info-grid">
            <div class="schedule-card" id="operating-hours">
                <!-- Content loaded by app.js -->
            </div>

            <div class="guidelines-list" id="guidelines-list">
                <!-- Content loaded by app.js -->
            </div>
        </div>

        <!-- Additional Services -->
        <h2 class="section-heading">Additional Services</h2>

        <div class="feature-grid" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); margin-bottom: 48px;" id="additional-services-grid">
            <!-- Content loaded by app.js -->
        </div>

        <!-- Photo Gallery -->
        <div class="photo-gallery">
            <h2>Photo Gallery</h2>
            <div class="gallery-grid" id="gallery-grid">
                <!-- Content loaded by app.js -->
            </div>
        </div>

        <!-- CTA Section -->
        <div class="cta-section" id="contact-section">
            <!-- Content loaded by app.js -->
        </div>
    </div>

    <!-- Load configuration and application logic -->
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
