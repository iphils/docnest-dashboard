<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>Page Not Found - DocNest Study Room</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 24px;
        }

        .error-card {
            text-align: center;
            max-width: 480px;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            opacity: 0.95;
        }

        .error-card h1 {
            font-size: 1.6rem;
            margin: 12px 0 10px;
        }

        .error-card p {
            font-size: 1rem;
            opacity: 0.9;
            line-height: 1.7;
            margin-bottom: 28px;
        }

        .home-btn {
            display: inline-block;
            background: #fff;
            color: #5a3d8a;
            text-decoration: none;
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .error-footer {
            margin-top: 36px;
            font-size: 0.85rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">404</div>
        <h1>This page took a study break</h1>
        <p>The page you are looking for does not exist or may have moved. Let's get you back on track.</p>
        <a href="/" class="home-btn">&#8592; Back to DocNest</a>
        <div class="error-footer">DocNest Study Room, Thripunithura, Ernakulam</div>
    </div>
</body>
</html>
