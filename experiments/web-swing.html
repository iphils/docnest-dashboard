<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Web Swing — A Little Spider Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1419;
    color: #f7fafc;
    min-height: 100vh;
    padding: 20px 16px 40px;
  }

  .wrap { max-width: 960px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 18px; }

  h1 { font-size: 2rem; color: #fc8181; margin-bottom: 4px; }
  .subtitle { font-size: 1.05rem; color: #cbd5e0; }

  .game-frame {
    background: #000;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    position: relative;
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
    background: #000;
  }

  .controls {
    margin-top: 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px 20px;
  }

  .controls h3 { font-size: 1rem; color: #fbd38d; margin-bottom: 8px; }

  .key-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 8px 24px;
    color: #e2e8f0;
    font-size: 0.95rem;
  }

  .key-list kbd {
    display: inline-block;
    background: #2d3748;
    color: #fbd38d;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: ui-monospace, monospace;
    font-size: 0.85rem;
    border: 1px solid #4a5568;
    margin-right: 4px;
  }

  .row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  button {
    font-family: inherit;
    font-size: 1rem;
    padding: 10px 20px;
    background: #e53e3e;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    min-height: 42px;
  }

  button:hover { background: #c53030; }

  .footer-note {
    text-align: center;
    color: #a0aec0;
    font-size: 0.9rem;
    margin-top: 24px;
  }

  .footer-note a { color: #fbd38d; text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🕷️ Web Swing</h1>
    <p class="subtitle">Aim, fire web at a glowing anchor, swing across the city.</p>
  </header>

  <div class="game-frame">
    <canvas id="game" width="900" height="500"></canvas>
  </div>

  <div class="controls">
    <h3>How to play</h3>
    <div class="key-list">
      <div><kbd>A</kbd><kbd>D</kbd> walk on ground / nudge in air</div>
      <div><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> aim the web</div>
      <div><kbd>Space</kbd> fire web · press again to release</div>
      <div><kbd>W</kbd><kbd>S</kbd> climb up / lower the rope while attached</div>
    </div>
    <div class="row">
      <button id="restart">Restart</button>
    </div>
  </div>

  <p class="footer-note">
    A small experiment in playful AI tools.
    <a href="../index.html">Back to DocNest</a>
  </p>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const GROUND_Y = H - 40;
  const GRAVITY = 0.45;
  const WALK_SPEED = 4;
  const MAX_WEB_RANGE = 380;
  const ANCHOR_HIT_RADIUS = 28;

  // World
  let anchors = [];
  let goalX = 0;
  let player, cameraX, aimDx, aimDy, hasWon, lastFireMissAt, lastFireMissAim;
  const keys = {};

  function makeLevel() {
    anchors = [
      { x: 320, y: 180 },
      { x: 600, y: 110 },
      { x: 900, y: 200 },
      { x: 1200, y: 90  },
      { x: 1500, y: 170 },
      { x: 1820, y: 80  },
      { x: 2150, y: 160 },
      { x: 2480, y: 100 },
      { x: 2800, y: 180 }
    ];
    anchors.forEach(a => a.hit = false);
    goalX = 3120;
    player = {
      x: 80, y: GROUND_Y - 12,
      vx: 0, vy: 0,
      attached: false,
      anchor: null,
      ropeLength: 0,
      angle: 0,
      angularVelocity: 0,
      facing: 1
    };
    cameraX = 0;
    aimDx = 0.7; aimDy = -0.7;
    hasWon = false;
    lastFireMissAt = 0;
    lastFireMissAim = null;
  }

  // ---------- Drawing ----------

  function drawBackground() {
    // Dusk sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    grad.addColorStop(0, '#1a365d');
    grad.addColorStop(0.55, '#9c4221');
    grad.addColorStop(1, '#fbd38d');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, GROUND_Y);

    // Distant moon
    ctx.beginPath();
    const moonX = 760 - cameraX * 0.05;
    ctx.arc(moonX, 80, 30, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(254, 252, 191, 0.85)';
    ctx.fill();

    // Far buildings (slow parallax)
    ctx.fillStyle = 'rgba(26, 32, 44, 0.6)';
    drawBuildings(0.25, 220, [60, 120, 90, 150, 110, 80, 140, 100, 130, 95, 170, 120], 60);

    // Mid buildings
    ctx.fillStyle = '#1a202c';
    drawBuildings(0.55, 280, [140, 200, 170, 240, 180, 210, 160, 230, 190, 250, 175, 220], 90);

    // Near foreground buildings
    ctx.fillStyle = '#0d1117';
    drawBuildings(0.85, 360, [260, 200, 320, 240, 280, 340, 220, 300, 260, 320], 120);

    // Ground
    ctx.fillStyle = '#0a0d12';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    ctx.fillStyle = '#2d3748';
    ctx.fillRect(0, GROUND_Y, W, 3);
  }

  function drawBuildings(parallax, spacing, heights, width) {
    const offset = (cameraX * parallax) % spacing;
    const startIdx = Math.floor((cameraX * parallax) / spacing);
    for (let i = -1; i < W / spacing + 2; i++) {
      const h = heights[(startIdx + i + heights.length * 100) % heights.length];
      const x = i * spacing - offset;
      ctx.fillRect(x, GROUND_Y - h, width, h);
      // Lit windows
      ctx.fillStyle = 'rgba(254, 252, 191, 0.5)';
      for (let wy = GROUND_Y - h + 12; wy < GROUND_Y - 12; wy += 18) {
        for (let wx = x + 10; wx < x + width - 10; wx += 16) {
          if (((wx + wy + startIdx + i) * 7) % 9 < 4) {
            ctx.fillRect(wx, wy, 4, 6);
          }
        }
      }
      // Restore building color (we just changed for windows)
      if (parallax === 0.25) ctx.fillStyle = 'rgba(26, 32, 44, 0.6)';
      else if (parallax === 0.55) ctx.fillStyle = '#1a202c';
      else ctx.fillStyle = '#0d1117';
    }
  }

  function drawGoal() {
    const sx = goalX - cameraX;
    if (sx < -40 || sx > W + 40) return;
    // Pole
    ctx.fillStyle = '#cbd5e0';
    ctx.fillRect(sx, GROUND_Y - 130, 4, 130);
    // Flag
    ctx.beginPath();
    ctx.moveTo(sx + 4, GROUND_Y - 130);
    ctx.lineTo(sx + 60, GROUND_Y - 115);
    ctx.lineTo(sx + 4, GROUND_Y - 100);
    ctx.closePath();
    ctx.fillStyle = '#48bb78';
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.font = 'bold 12px sans-serif';
    ctx.fillText('GOAL', sx + 12, GROUND_Y - 113);
  }

  function drawAnchors() {
    for (const a of anchors) {
      const sx = a.x - cameraX;
      if (sx < -50 || sx > W + 50) continue;
      const dx = a.x - player.x, dy = a.y - player.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const reachable = dist < MAX_WEB_RANGE && !player.attached;

      // Halo
      const pulse = 14 + Math.sin(performance.now() / 300) * 3;
      if (reachable) {
        ctx.beginPath();
        ctx.arc(sx, a.y, pulse + 6, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(99, 179, 237, 0.18)';
        ctx.fill();
      }

      // Outer ring
      ctx.beginPath();
      ctx.arc(sx, a.y, 12, 0, Math.PI * 2);
      ctx.strokeStyle = a.hit ? '#9ae6b4' : (reachable ? '#90cdf4' : '#a0aec0');
      ctx.lineWidth = 3;
      ctx.stroke();

      // Inner dot
      ctx.beginPath();
      ctx.arc(sx, a.y, 5, 0, Math.PI * 2);
      ctx.fillStyle = a.hit ? '#9ae6b4' : (reachable ? '#bee3f8' : '#e2e8f0');
      ctx.fill();
    }
  }

  function drawWeb() {
    if (player.attached) {
      const sx = player.x - cameraX;
      const ax = player.anchor.x - cameraX;
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(sx, player.y);
      ctx.lineTo(ax, player.anchor.y);
      ctx.stroke();
    }
    // Brief miss flash
    const elapsed = performance.now() - lastFireMissAt;
    if (elapsed < 250 && lastFireMissAim) {
      const sx = lastFireMissAim.fromX - cameraX;
      const sy = lastFireMissAim.fromY;
      const len = MAX_WEB_RANGE * (1 - elapsed / 250);
      ctx.strokeStyle = `rgba(255,255,255,${0.6 * (1 - elapsed/250)})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + lastFireMissAim.dx * len, sy + lastFireMissAim.dy * len);
      ctx.stroke();
    }
  }

  function drawAim() {
    if (player.attached || hasWon) return;
    const sx = player.x - cameraX;
    const sy = player.y;
    ctx.strokeStyle = 'rgba(254, 252, 191, 0.55)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + aimDx * 90, sy + aimDy * 90);
    ctx.stroke();
    ctx.setLineDash([]);
    // Tip
    ctx.beginPath();
    ctx.arc(sx + aimDx * 90, sy + aimDy * 90, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#fefcbf';
    ctx.fill();
  }

  function drawPlayer() {
    const sx = player.x - cameraX;
    const sy = player.y;
    // Body
    ctx.beginPath();
    ctx.arc(sx, sy, 11, 0, Math.PI * 2);
    ctx.fillStyle = '#e53e3e';
    ctx.fill();
    ctx.strokeStyle = '#742a2a';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Eyes (mask)
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.ellipse(sx - 4, sy - 2, 3, 2.2, 0, 0, Math.PI * 2);
    ctx.ellipse(sx + 4, sy - 2, 3, 2.2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Web pattern hint
    ctx.strokeStyle = 'rgba(116, 42, 42, 0.6)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(sx - 8, sy + 4); ctx.lineTo(sx + 8, sy + 4);
    ctx.moveTo(sx, sy - 9); ctx.lineTo(sx, sy + 9);
    ctx.stroke();
  }

  function drawHud() {
    const hits = anchors.filter(a => a.hit).length;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(12, 12, 180, 44);
    ctx.fillStyle = '#fefcbf';
    ctx.font = 'bold 14px sans-serif';
    ctx.fillText(`Anchors hit: ${hits} / ${anchors.length}`, 22, 32);
    const distLeft = Math.max(0, Math.round((goalX - player.x) / 10));
    ctx.fillText(`To goal: ${distLeft} m`, 22, 50);

    if (hasWon) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(W/2 - 200, H/2 - 60, 400, 120);
      ctx.fillStyle = '#9ae6b4';
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🎉 You made it!', W/2, H/2 - 10);
      ctx.fillStyle = '#fefcbf';
      ctx.font = '16px sans-serif';
      ctx.fillText(`Anchors used: ${hits}.  Press Restart to swing again.`, W/2, H/2 + 20);
      ctx.textAlign = 'left';
    }
  }

  // ---------- Update ----------

  function updateAim() {
    let dx = 0, dy = 0;
    if (keys.ArrowLeft) dx -= 1;
    if (keys.ArrowRight) dx += 1;
    if (keys.ArrowUp) dy -= 1;
    if (keys.ArrowDown) dy += 1;
    if (dx !== 0 || dy !== 0) {
      const m = Math.sqrt(dx*dx + dy*dy);
      aimDx = dx / m;
      aimDy = dy / m;
    }
  }

  function step() {
    if (hasWon) return;
    updateAim();

    if (player.attached) {
      const L = player.ropeLength;
      // Pendulum: angularAccel = -(g/L) * sin(angle)
      const angularAccel = -(GRAVITY / L) * Math.sin(player.angle);
      player.angularVelocity += angularAccel;
      player.angularVelocity *= 0.9985;

      // Pump the swing with a/d
      if (keys.a) player.angularVelocity -= 0.0015;
      if (keys.d) player.angularVelocity += 0.0015;

      // Climb / extend rope
      if (keys.w && player.ropeLength > 40) player.ropeLength -= 2.2;
      if (keys.s && player.ropeLength < 380) player.ropeLength += 2.2;

      player.angle += player.angularVelocity;
      player.x = player.anchor.x + Math.sin(player.angle) * player.ropeLength;
      player.y = player.anchor.y + Math.cos(player.angle) * player.ropeLength;
    } else {
      player.vy += GRAVITY;
      const onGround = player.y >= GROUND_Y - 12;
      if (onGround) {
        if (keys.a) { player.vx = -WALK_SPEED; player.facing = -1; }
        else if (keys.d) { player.vx = WALK_SPEED; player.facing = 1; }
        else player.vx *= 0.6;
      } else {
        if (keys.a) player.vx -= 0.18;
        if (keys.d) player.vx += 0.18;
        player.vx = Math.max(-9, Math.min(9, player.vx));
      }

      player.x += player.vx;
      player.y += player.vy;

      if (player.y >= GROUND_Y - 12) {
        player.y = GROUND_Y - 12;
        player.vy = 0;
      }
      if (player.x < 20) { player.x = 20; player.vx = 0; }
    }

    // Goal check
    if (player.x >= goalX) hasWon = true;

    // Camera follows
    const targetCamX = Math.max(0, player.x - W * 0.4);
    cameraX += (targetCamX - cameraX) * 0.12;
  }

  function tryFireWeb() {
    if (hasWon) return;
    if (player.attached) {
      // Release: convert angular to linear velocity
      const a = player.angle;
      const L = player.ropeLength;
      const av = player.angularVelocity;
      player.vx = Math.cos(a) * av * L;
      player.vy = -Math.sin(a) * av * L;
      player.attached = false;
      player.anchor = null;
      return;
    }

    // Cast aim ray, find best anchor whose perpendicular distance to the ray is small
    let best = null, bestDot = Infinity;
    for (const anchor of anchors) {
      const dx = anchor.x - player.x;
      const dy = anchor.y - player.y;
      const dot = dx * aimDx + dy * aimDy; // distance along aim
      if (dot < 30 || dot > MAX_WEB_RANGE) continue;
      const cross = Math.abs(dx * aimDy - dy * aimDx); // perpendicular distance
      if (cross < ANCHOR_HIT_RADIUS && dot < bestDot) {
        best = anchor;
        bestDot = dot;
      }
    }

    if (best) {
      player.attached = true;
      player.anchor = best;
      best.hit = true;
      const dx = player.x - best.x;
      const dy = player.y - best.y;
      player.ropeLength = Math.sqrt(dx*dx + dy*dy);
      player.angle = Math.atan2(dx, dy);
      player.angularVelocity =
        (player.vx * Math.cos(player.angle) - player.vy * Math.sin(player.angle)) / player.ropeLength;
      player.vx = 0;
      player.vy = 0;
    } else {
      lastFireMissAt = performance.now();
      lastFireMissAim = { fromX: player.x, fromY: player.y, dx: aimDx, dy: aimDy };
    }
  }

  // ---------- Loop ----------

  function frame() {
    step();
    drawBackground();
    drawGoal();
    drawAnchors();
    drawWeb();
    drawAim();
    drawPlayer();
    drawHud();
    requestAnimationFrame(frame);
  }

  // ---------- Input ----------

  window.addEventListener('keydown', (e) => {
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
    const k = e.key === ' ' ? ' ' : (e.key.length === 1 ? e.key.toLowerCase() : e.key);
    keys[k] = true;
    if (k === ' ') tryFireWeb();
    if (k === 'r') makeLevel();
  });
  window.addEventListener('keyup', (e) => {
    const k = e.key === ' ' ? ' ' : (e.key.length === 1 ? e.key.toLowerCase() : e.key);
    keys[k] = false;
  });

  document.getElementById('restart').addEventListener('click', () => {
    makeLevel();
    canvas.focus();
  });

  makeLevel();
  frame();
})();
</script>
</body>
</html>
