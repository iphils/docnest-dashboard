<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Memory Match вАФ A Gentle Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(180deg, #fef9f3 0%, #f0f7f4 100%);
    color: #2d3748;
    min-height: 100vh;
    padding: 24px 16px 48px;
    line-height: 1.6;
  }

  .wrap {
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  h1 {
    font-size: 2.4rem;
    color: #1a202c;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 1.25rem;
    color: #4a5568;
  }

  .panel {
    background: white;
    border-radius: 16px;
    padding: 20px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat {
    font-size: 1.25rem;
    color: #2d3748;
  }

  .stat strong {
    color: #2b6cb0;
    font-size: 1.5rem;
    margin-left: 6px;
  }

  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  button {
    font-family: inherit;
    font-size: 1.1rem;
    padding: 12px 22px;
    border: 2px solid #cbd5e0;
    background: white;
    color: #2d3748;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    min-height: 48px;
  }

  button:hover {
    background: #edf2f7;
    border-color: #a0aec0;
  }

  button.primary {
    background: #38a169;
    color: white;
    border-color: #38a169;
  }

  button.primary:hover {
    background: #2f855a;
    border-color: #2f855a;
  }

  button.active {
    background: #2b6cb0;
    color: white;
    border-color: #2b6cb0;
  }

  .difficulty {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .difficulty-label {
    font-size: 1.1rem;
    color: #4a5568;
    margin-right: 4px;
  }

  .difficulty button {
    padding: 8px 16px;
    font-size: 1rem;
    min-height: 40px;
  }

  .board {
    display: grid;
    gap: 14px;
    margin-bottom: 24px;
  }

  .board.easy { grid-template-columns: repeat(3, 1fr); }
  .board.medium { grid-template-columns: repeat(4, 1fr); }
  .board.hard { grid-template-columns: repeat(4, 1fr); }

  @media (max-width: 480px) {
    .board.medium, .board.hard { grid-template-columns: repeat(3, 1fr); }
    h1 { font-size: 2rem; }
  }

  .card {
    aspect-ratio: 1;
    perspective: 1000px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.5s;
    transform-style: preserve-3d;
  }

  .card.flipped .card-inner,
  .card.matched .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }

  .card-back {
    background: linear-gradient(135deg, #4299e1 0%, #2b6cb0 100%);
    color: white;
    font-size: 2.5rem;
  }

  .card-front {
    background: white;
    border: 2px solid #e2e8f0;
    font-size: 4rem;
    transform: rotateY(180deg);
  }

  .card.matched .card-front {
    background: #f0fff4;
    border-color: #9ae6b4;
    box-shadow: 0 0 0 3px #9ae6b4, 0 2px 6px rgba(0,0,0,0.1);
  }

  @media (max-width: 480px) {
    .card-front { font-size: 2.8rem; }
    .card-back { font-size: 1.8rem; }
  }

  .win-banner {
    display: none;
    background: linear-gradient(135deg, #fefcbf 0%, #fbd38d 100%);
    border: 2px solid #f6ad55;
    border-radius: 16px;
    padding: 28px;
    text-align: center;
    margin-bottom: 24px;
    animation: pop 0.5s ease;
  }

  .win-banner.show { display: block; }

  .win-banner h2 {
    font-size: 1.8rem;
    color: #744210;
    margin-bottom: 8px;
  }

  .win-banner p {
    font-size: 1.2rem;
    color: #744210;
  }

  @keyframes pop {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .footer-note {
    text-align: center;
    color: #718096;
    font-size: 1rem;
    margin-top: 32px;
    padding: 0 16px;
  }

  .footer-note a {
    color: #2b6cb0;
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Memory Match</h1>
    <p class="subtitle">Tap two cards. Find the matching pair.</p>
  </header>

  <div class="panel">
    <div class="stat">Moves <strong id="moves">0</strong></div>
    <div class="stat">Pairs <strong id="pairs">0</strong></div>
    <div class="controls">
      <button class="primary" id="restart">Play Again</button>
    </div>
  </div>

  <div class="panel">
    <div class="difficulty">
      <span class="difficulty-label">Size:</span>
      <button data-level="easy" class="active">Small (6 pairs)</button>
      <button data-level="medium">Medium (8 pairs)</button>
      <button data-level="hard">Large (10 pairs)</button>
    </div>
  </div>

  <div class="win-banner" id="winBanner">
    <h2 id="winTitle">Wonderful!</h2>
    <p id="winMessage">You found all the pairs.</p>
  </div>

  <div class="board easy" id="board"></div>

  <p class="footer-note">
    A small experiment in playful AI tools.
    <a href="../index.html">Back to DocNest</a>
  </p>
</div>

<script>
  const SYMBOLS = ['рЯМї','рЯМє','рЯМЈ','рЯМЉ','рЯМЄ','рЯНА','рЯНО','рЯНК','рЯНЗ','рЯНУ','рЯ¶Л','рЯРЭ','рЯМЩ','в≠Р','рЯМИ','рЯОµ'];

  const LEVELS = {
    easy: 6,
    medium: 8,
    hard: 10
  };

  let level = 'easy';
  let firstCard = null;
  let secondCard = null;
  let lockBoard = false;
  let moves = 0;
  let matched = 0;
  let totalPairs = 0;

  const board = document.getElementById('board');
  const movesEl = document.getElementById('moves');
  const pairsEl = document.getElementById('pairs');
  const winBanner = document.getElementById('winBanner');
  const winTitle = document.getElementById('winTitle');
  const winMessage = document.getElementById('winMessage');

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function buildBoard() {
    totalPairs = LEVELS[level];
    moves = 0;
    matched = 0;
    firstCard = null;
    secondCard = null;
    lockBoard = false;
    movesEl.textContent = '0';
    pairsEl.textContent = `0 / ${totalPairs}`;
    winBanner.classList.remove('show');

    board.className = `board ${level}`;
    board.innerHTML = '';

    const chosen = shuffle([...SYMBOLS]).slice(0, totalPairs);
    const deck = shuffle([...chosen, ...chosen]);

    deck.forEach((symbol) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.symbol = symbol;
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-back">?</div>
          <div class="card-face card-front">${symbol}</div>
        </div>
      `;
      card.addEventListener('click', () => onCardClick(card));
      board.appendChild(card);
    });
  }

  function onCardClick(card) {
    if (lockBoard) return;
    if (card === firstCard) return;
    if (card.classList.contains('matched')) return;
    if (card.classList.contains('flipped')) return;

    card.classList.add('flipped');

    if (!firstCard) {
      firstCard = card;
      return;
    }

    secondCard = card;
    moves++;
    movesEl.textContent = moves;
    lockBoard = true;

    if (firstCard.dataset.symbol === secondCard.dataset.symbol) {
      setTimeout(() => {
        firstCard.classList.add('matched');
        secondCard.classList.add('matched');
        matched++;
        pairsEl.textContent = `${matched} / ${totalPairs}`;
        resetTurn();
        if (matched === totalPairs) celebrate();
      }, 400);
    } else {
      setTimeout(() => {
        firstCard.classList.remove('flipped');
        secondCard.classList.remove('flipped');
        resetTurn();
      }, 1100);
    }
  }

  function resetTurn() {
    firstCard = null;
    secondCard = null;
    lockBoard = false;
  }

  function celebrate() {
    const messages = [
      { t: 'Wonderful!', m: `You found all ${totalPairs} pairs in ${moves} moves.` },
      { t: 'Beautifully done!', m: `All pairs matched. ${moves} moves.` },
      { t: 'A perfect round!', m: `Every pair found. ${moves} moves.` }
    ];
    const pick = messages[Math.floor(Math.random() * messages.length)];
    winTitle.textContent = pick.t;
    winMessage.textContent = pick.m;
    winBanner.classList.add('show');
    winBanner.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  document.getElementById('restart').addEventListener('click', buildBoard);

  document.querySelectorAll('.difficulty button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.difficulty button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      level = btn.dataset.level;
      buildBoard();
    });
  });

  buildBoard();
</script>
</body>
</html>
